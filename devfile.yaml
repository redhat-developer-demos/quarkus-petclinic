schemaVersion: 2.3.0
metadata:
  name: quarkus-petclinic
  displayName: Quarkus Petclinic
  description: Quarkus Petclinic application with Maven and PostgreSQL
  icon: https://design.jboss.org/quarkus/logo/final/SVG/quarkus_icon_rgb_default.svg
  tags:
    - Java
    - Quarkus
    - Maven
    - PostgreSQL
  projectType: Quarkus
  language: Java
  version: 1.0.0
  website: https://quarkus.io
projects:
  - name: quarkus-petclinic
    git:
      remotes:
        origin: https://github.com/redhat-developer-demos/quarkus-petclinic.git
      checkoutFrom:
        revision: master
components:
  - name: tools
    container:
      image: registry.access.redhat.com/ubi9/openjdk-21:1.24-2
      args: ['tail', '-f', '/dev/null']
      memoryLimit: 2Gi
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
      endpoints:
        - name: http-quarkus
          targetPort: 8080
          protocol: http
        - name: debug
          targetPort: 5005
          exposure: none
      env:
        - name: DEBUG_PORT
          value: '5005'
        - name: QUARKUS_DATASOURCE_USERNAME
          value: developer
        - name: QUARKUS_DATASOURCE_PASSWORD
          value: developer
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: jdbc:postgresql://postgresql:5432/mydb
  - name: postgresql
    container:
      image: postgres:18
      memoryLimit: 512Mi
      env:
        - name: POSTGRES_USER
          value: developer
        - name: POSTGRES_PASSWORD
          value: developer
        - name: POSTGRES_DB
          value: mydb
      volumeMounts:
        - name: postgres-storage
          path: /var/lib/postgresql/data
      endpoints:
        - name: postgresql
          targetPort: 5432
          exposure: none
  - name: m2
    volume:
      size: 3Gi
  - name: postgres-storage
    volume:
      size: 1Gi
commands:
  - id: compile
    exec:
      component: tools
      commandLine: './mvnw -Dmaven.repo.local=/home/user/.m2/repository compile'
      workingDir: ${PROJECT_SOURCE}
  - id: package
    exec:
      component: tools
      commandLine: './mvnw -Dmaven.repo.local=/home/user/.m2/repository package'
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: dev-run
    exec:
      component: tools
      commandLine: './mvnw -Dmaven.repo.local=/home/user/.m2/repository quarkus:dev -Dquarkus.http.host=0.0.0.0'
      hotReloadCapable: true
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
  - id: dev-debug
    exec:
      component: tools
      commandLine: './mvnw -Dmaven.repo.local=/home/user/.m2/repository quarkus:dev -Dquarkus.http.host=0.0.0.0 -Ddebug=${DEBUG_PORT}'
      hotReloadCapable: true
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: debug
        isDefault: true
events:
  postStart:
    - compile
